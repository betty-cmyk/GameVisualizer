<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>游戏科学论文空间图谱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0b0e14; color: #e6edf3; font-family: -apple-system, sans-serif; overflow: hidden; }
  #app { width: 100vw; height: 100vh; position: relative; }
  canvas { cursor: move; }

  /* 状态栏 */
  #header { position: absolute; top: 0; left: 0; right: 0; height: 50px; background: rgba(22, 27, 34, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid #30363d; display: flex; align-items: center; padding: 0 20px; z-index: 100; pointer-events: none; }
  #title { font-size: 16px; font-weight: bold; color: #58a6ff; }
  .stats-badge { background: #21262d; padding: 4px 10px; border-radius: 20px; font-size: 12px; margin-left: 15px; color: #8b949e; }

  /* 论文档案面板 */
  #detail-panel {
    position: absolute; right: 20px; top: 70px; bottom: 30px;
    width: 350px; background: rgba(13,17,23,0.9); border: 1px solid #30363d;
    border-radius: 12px; display: none; flex-direction: column;
    z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); backdrop-filter: blur(15px);
  }
  .detail-header { padding: 20px; border-bottom: 1px solid #30363d; }
  .detail-title { color: #58a6ff; font-size: 17px; font-weight: bold; line-height: 1.4; }
  .detail-meta { color: #8b949e; font-size: 12px; margin-top: 8px; }
  .detail-body { overflow-y: auto; flex: 1; padding: 20px; font-size: 13px; line-height: 1.6; color: #adbac7; }
  .detail-label { color: #f78166; font-weight: bold; margin-top: 15px; display: block; font-size: 11px; text-transform: uppercase; }
  .detail-text { margin-top: 5px; text-align: justify; }
  .detail-link { display: block; background: #238636; color: #fff; padding: 10px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; text-align: center; margin-top: 10px; }
  .close-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #8b949e; font-size: 18px; cursor: pointer; }

  #tooltip { position: absolute; pointer-events: none; background: rgba(22, 27, 34, 0.9); border: 1px solid #58a6ff; border-radius: 6px; padding: 8px 12px; font-size: 12px; display: none; z-index: 2000; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">🎮 Game Engineering Space Graph</div>
    <div class="stats-badge">文献总量: <span id="count-n">-</span></div>
    <div style="margin-left:auto; font-size:12px; color:#8b949e">提示：点击圆点激活关联路径</div>
  </div>

  <canvas id="main-canvas"></canvas>
  <div id="tooltip"></div>

  <div id="detail-panel">
    <button class="close-btn" onclick="this.parentElement.style.display='none'">×</button>
    <div class="detail-header">
      <div class="detail-title" id="d-title">-</div>
      <div class="detail-meta" id="d-meta">-</div>
    </div>
    <div class="detail-body">
      <a id="d-link" class="detail-link" href="#" target="_blank">🚀 查看原文 (ACM/IEEE/Scholar)</a>
      <span class="detail-label">摘要提要</span>
      <div class="detail-text" id="d-abs">-</div>
      <span class="detail-label">顶会评级 & 被引</span>
      <div class="detail-text" id="d-tier">-</div>
    </div>
  </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const G = {GRAPH_DATA};
const canvas = document.querySelector('#main-canvas');
const ctx = canvas.getContext('2d', { alpha: false });
const tt = document.querySelector('#tooltip');
let width, height, transform = d3.zoomIdentity;
let nodes = G.nodes, edges = G.edges;
let selectedNode = null, hoveredNode = null;

// 初始化
document.getElementById('count-n').innerText = nodes.length;

function resize() {
  width = window.innerWidth; height = window.innerHeight;
  canvas.width = width * window.devicePixelRatio; canvas.height = height * window.devicePixelRatio;
  canvas.style.width = width + 'px'; canvas.style.height = height + 'px';
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
window.addEventListener('resize', resize); resize();

// 1. 强化力学仿真：让节点彻底散开
const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(edges).id(d => d.id).distance(150).strength(0.2))
  .force("charge", d3.forceManyBody().strength(-350).distanceMax(800)) // 极强斥力
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(d => (d.r || 5) + 25)) // 增大呼吸空间
  .on("tick", render);

// 2. 高性能 Canvas 渲染
function render() {
  ctx.save();
  ctx.fillStyle = "#0b0e14";
  ctx.fillRect(0, 0, width, height);
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  // 只有在有节点被选中或悬浮时，才绘制该节点相关的线（动态连线）
  const active = selectedNode || hoveredNode;
  if (active) {
    ctx.beginPath();
    ctx.strokeStyle = "rgba(88, 166, 255, 0.6)";
    ctx.lineWidth = 1.2 / transform.k;
    edges.forEach(e => {
      if (e.source.id === active.id || e.target.id === active.id) {
        ctx.moveTo(e.source.x, e.source.y);
        ctx.lineTo(e.target.x, e.target.y);
      }
    });
    ctx.stroke();
  }

  // 绘制节点
  nodes.forEach(n => {
    ctx.beginPath();
    ctx.fillStyle = n.color || "#58a6ff";
    
    // 空间分层：非相关节点变淡
    if (active) {
      const isRelated = n.id === active.id || edges.some(e => 
        (e.source.id === active.id && e.target.id === n.id) || (e.target.id === active.id && e.source.id === n.id)
      );
      ctx.globalAlpha = isRelated ? 1 : 0.15;
    } else {
      ctx.globalAlpha = n.type === 'category' ? 0.4 : 0.85;
    }

    const r = n.type === 'category' ? 15 : (n.r || 5);
    ctx.arc(n.x, n.y, r, 0, 2 * Math.PI);
    ctx.fill();

    // 绘制文字（分类名称常驻，论文标题仅在激活时显示）
    if (n.type === 'category' || (active && ctx.globalAlpha > 0.5)) {
      ctx.font = `${n.type==='category'?'bold 14px':'11px'} sans-serif`;
      ctx.fillStyle = "#e6edf3";
      ctx.fillText(n.label, n.x + r + 5, n.y + 4);
    }
  });

  ctx.restore();
}

// 3. 交互逻辑 (缩放/悬浮/点击)
const zoom = d3.zoom().scaleExtent([0.02, 10]).on("zoom", (e) => { transform = e.transform; render(); });
d3.select(canvas).call(zoom);

canvas.addEventListener('mousemove', e => {
  const [mx, my] = [(e.offsetX - transform.x) / transform.k, (e.offsetY - transform.y) / transform.k];
  const found = nodes.find(n => Math.hypot(n.x - mx, n.y - my) < (n.r || 10) + 5);
  
  if (found !== hoveredNode) {
    hoveredNode = found;
    if (found) {
      tt.style.display = 'block';
      tt.style.left = e.pageX + 15 + 'px'; tt.style.top = e.pageY + 15 + 'px';
      tt.innerHTML = `<strong>${found.full_title || found.label}</strong><br>被引: ${found.citations || 0}`;
    } else {
      tt.style.display = 'none';
    }
    render();
  }
});

canvas.addEventListener('click', () => {
  if (hoveredNode && hoveredNode.type !== 'category') {
    selectedNode = hoveredNode; showDetail(selectedNode);
  } else {
    selectedNode = null; document.querySelector('#detail-panel').style.display = 'none';
  }
  render();
});

function showDetail(d) {
  const panel = document.querySelector('#detail-panel');
  panel.style.display = 'flex';
  document.querySelector('#d-title').innerText = d.full_title;
  document.querySelector('#d-meta').innerText = `👤 ${d.author || '未知'}  •  🏷️ ${d.primary_category}`;
  document.querySelector('#d-abs').innerText = d.abstract || '暂无摘要内容。';
  document.querySelector('#d-tier').innerText = `层级: ${d.tier}级  |  🔥 被引用: ${d.citations}次`;
  const link = document.querySelector('#d-link');
  if (d.source_url) { link.href = d.source_url; link.style.display = 'block'; } else { link.style.display = 'none'; }
}

// 预加速：进入即稳定
for (let i = 0; i < 200; ++i) simulation.tick();
render();

</script>
</body>
</html>
